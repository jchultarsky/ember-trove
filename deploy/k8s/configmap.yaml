apiVersion: v1
kind: ConfigMap
metadata:
  name: ember-trove-config
  namespace: ember-trove
data:
  S3_ENDPOINT:       "http://minio:9000"
  S3_BUCKET:         "ember-trove"
  S3_REGION:         "us-east-1"
  OIDC_ISSUER:       "https://cognito-idp.us-east-2.amazonaws.com/us-east-2_XXXXXXXXX"
  OIDC_CLIENT_ID:    "ember-trove-api"
  # Replace with your actual public hostname
  FRONTEND_URL:      "https://ember-trove.example.com"
  API_EXTERNAL_URL:  "https://ember-trove.example.com"
  HOST:              "0.0.0.0"
  PORT:              "3003"
  RUST_LOG:          "info"
