server {
    # Local-auth variant of nginx.conf (mounted over it by
    # docker-compose.local-auth.yml). Identical to the base config plus the
    # two Keycloak proxy locations at the bottom — keep the rest in sync with
    # deploy/nginx.conf when it changes.
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    client_max_body_size 50m;

    location /api/ {
        proxy_pass http://api:3003/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffer_size          32k;
        proxy_buffers              4 32k;
        proxy_busy_buffers_size    32k;
    }

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' blob: data:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    }

    location ~* \.(wasm|js|css|svg|ico|png|jpg|webp|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    }

    # ── Keycloak (local-auth stack only) ────────────────────────────────────
    # Browser-facing realm endpoints (login page, authorize, logout) ride this
    # origin so the OIDC issuer is http://localhost:8003 for the browser AND
    # in tokens. The SPA's CSP must NOT apply to Keycloak's login pages (its
    # own inline scripts/styles would be blocked) — declaring any add_header
    # in these locations drops the server-level header set (nginx inheritance
    # rule, same note as /sw.js above), which is exactly what we want; Keycloak
    # sends its own security headers.
    # `^~` is load-bearing: without it, the static-asset regex location below
    # (`~* \.(…css|js|ico…)$`) outranks this prefix (nginx evaluates regex
    # locations before prefix ones) and swallows Keycloak's own
    # /resources/*.css|.js|.ico — serving 404s from the SPA root, which renders
    # the login page unstyled. `^~` tells nginx: on this prefix, skip regex.
    location ^~ /realms/ {
        proxy_pass http://keycloak:8080/realms/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_buffer_size          32k;
        proxy_buffers              4 32k;
        proxy_busy_buffers_size    32k;
        add_header X-Local-Auth "keycloak" always;
    }

    # `^~` required — see the note on /realms/ above. Keycloak's login theme
    # CSS/JS/favicon all live under /resources/ and end in .css/.js/.ico.
    location ^~ /resources/ {
        proxy_pass http://keycloak:8080/resources/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        add_header X-Local-Auth "keycloak" always;
    }

    gzip            on;
    gzip_types      text/plain text/css application/javascript application/wasm;
    gzip_min_length 1024;
}
