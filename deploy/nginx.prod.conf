# ── Rate-limiting zones ────────────────────────────────────────────────────────
# Credential / brute-force surface (login, callback, refresh, logout). Loosened
# from 10 → 30 r/m while the app is in active development so iterative login
# testing isn't painful; tighten again once it matters (this is a deliberate,
# revisit-later relaxation — 2026-06-06).
limit_req_zone $binary_remote_addr zone=auth:10m rate=30r/m;
# Session check (/api/auth/me): a benign *authenticated* read hit on every app
# load. It must NOT share the strict `auth` budget — when it gets 429'd the SPA's
# AuthGate treats it as logged-out and loops login↔callback, re-saturating the
# limiter. Given its own generous per-IP allowance below.
limit_req_zone $binary_remote_addr zone=authsession:10m rate=120r/m;
# General API: 120 requests/minute per IP.
limit_req_zone $binary_remote_addr zone=api:10m  rate=120r/m;

# HTTP — redirect to HTTPS, except for ACME certificate renewal challenges
server {
    listen 80;
    server_name trove.chultarsky.me;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — TLS termination + reverse proxy
server {
    listen 443 ssl;
    server_name trove.chultarsky.me;

    ssl_certificate     /etc/letsencrypt/live/trove.chultarsky.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trove.chultarsky.me/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    # CSP: 'unsafe-inline' is removed from script-src in favour of a per-request
    # nonce ($request_id) injected into every <script> tag by sub_filter in the
    # `location /` block below, paired with 'strict-dynamic' so the nonced Trunk
    # module bootstrap can load the (per-build, hashed) WASM-glue JS it imports.
    # This blocks injected inline scripts without pinning per-build hashes.
    # 'wasm-unsafe-eval' + 'unsafe-eval' stay — wasm-bindgen's glue needs eval.
    # style-src keeps 'unsafe-inline' (the loading-screen inline <style> + Tailwind).
    # Google Fonts: googleapis.com (style) + gstatic.com (font files).
    # Cognito hosted-UI domain is in connect-src for the token endpoint.
    add_header Content-Security-Policy "default-src 'self'; script-src 'nonce-$request_id' 'strict-dynamic' 'wasm-unsafe-eval' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://trove-chultarsky.auth.us-east-2.amazoncognito.com https://cognito-idp.us-east-2.amazonaws.com; frame-ancestors 'none';" always;

    # Allow uploads up to 50 MB — matches the API's DefaultBodyLimit.
    client_max_body_size 50m;

    # ── Swagger UI — internal access only ────────────────────────────────────
    # API docs are not needed from the public internet.
    location ~ ^/(swagger-ui|api-docs) {
        allow 127.0.0.1;
        deny all;
    }

    # ── Session check — generous limit (benign read, hit on every app load) ──
    # An exact-match location wins over the `~ ^/api/auth/` regex below, so
    # /api/auth/me uses its own relaxed budget and never trips the strict auth
    # limiter — preventing the AuthGate login↔callback loop under throttling.
    location = /api/auth/me {
        limit_req zone=authsession burst=30 nodelay;
        limit_req_status 429;

        proxy_pass              http://api:3003;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_buffering         off;
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;
    }

    # ── Auth endpoints — strict rate limit ───────────────────────────────────
    location ~ ^/api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass              http://api:3003;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_buffering         off;
        # JWT cookies in auth callback Set-Cookie headers exceed the default 4k
        # header buffer — raise it to accommodate large token payloads.
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;
    }

    # ── API backend — general rate limit + generous timeout for streaming ─────
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        limit_req_status 429;

        proxy_pass              http://api:3003/api/;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_buffering         off;
        proxy_read_timeout      300s;
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;
    }

    # ── Frontend — proxy to the UI container (nginx serving WASM + assets) ───
    location / {
        proxy_pass       http://ui:8080/;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # CSP nonce injection: stamp the same per-request $request_id used in the
        # script-src 'nonce-...' header onto every <script> tag in the HTML so
        # the inline bootstrap/SW/WASM-shim scripts run without 'unsafe-inline'.
        # Disable upstream compression so sub_filter can rewrite the HTML body
        # (sub_filter only touches text/html; WASM/JS assets pass through).
        proxy_set_header Accept-Encoding "";
        sub_filter_once  off;
        sub_filter '<script' '<script nonce="$request_id"';
    }
}
