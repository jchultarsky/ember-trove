name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the friction or missing capability, not just the mechanism.
      placeholder: "When I …, I can't …, which means …"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you imagine it working. Alternatives you considered are welcome.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, prior art, related issues.
