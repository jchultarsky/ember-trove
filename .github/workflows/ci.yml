name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Opt into Node.js 24 now; GitHub will force it on all runners from June 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Third-party Actions are pinned to a commit SHA (supply-chain hardening) with a
# trailing `# vX` comment for readability. Dependabot (.github/dependabot.yml)
# proposes weekly bumps to these pins. dtolnay/rust-toolchain is pinned to its
# `stable` branch commit; the actual toolchain channel comes from rust-toolchain.toml.

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # rustfmt is declared in rust-toolchain.toml `components` (dtolnay ignores the
      # workflow `components:` field when that file is present).
      - name: cargo fmt --all --check
        run: cargo fmt --all --check

  check:
    name: check (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check (api + common)
        run: cargo check --workspace --exclude ui

      - name: cargo clippy (api + common)
        run: cargo clippy --workspace --exclude ui -- -D warnings

      - name: cargo test (api + common)
        run: cargo test --workspace --exclude ui

  check-wasm:
    name: check (wasm32-unknown-unknown)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust (pinned via rust-toolchain.toml) + wasm32 target
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-wasm-

      - name: cargo check (ui, wasm32)
        run: cargo check -p ui --target wasm32-unknown-unknown

      - name: cargo clippy (ui, wasm32)
        run: cargo clippy -p ui --target wasm32-unknown-unknown -- -D warnings

  coverage:
    name: coverage (api + common)
    runs-on: ubuntu-latest
    # Now a hard gate: fails if api+common line coverage drops below the floor
    # below. The floor (24%) sits ~2 points under the measured baseline
    # (25.96% lines on 2026-07-17, after the v2.23.0 "trust the suite" work;
    # previously 17% under an 18.7% baseline, 2026-06-05) so it never blocks
    # the existing suite, but it does block a real regression. Raise it
    # deliberately as the suite grows (ui is WASM and excluded, so its logic
    # should live in `common/` to be counted; the pg-tests job is feature-
    # gated and does not contribute here).

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Add llvm-tools-preview (required by cargo-llvm-cov)
        run: rustup component add llvm-tools-preview

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-cov-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-llvm-cov

      - name: Coverage summary + floor (api + common; ui is WASM, excluded)
        run: cargo llvm-cov --workspace --exclude ui --summary-only --fail-under-lines 24

  audit:
    name: cargo audit (security)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ubuntu-cargo-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-audit-

      - name: Install cargo-audit
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-audit

      - name: Run cargo audit
        # Ignored advisories live in .cargo/audit.toml (the single source of
        # truth, read automatically) — each with a dated rationale. Do NOT add
        # inline --ignore flags here; that previously diverged from audit.toml.
        run: cargo audit

  deny:
    name: cargo deny (licenses + bans + sources)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ubuntu-cargo-deny-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-deny-

      - name: Install cargo-deny
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-deny

      - name: Run cargo deny
        # Advisories are owned by `cargo audit` (.cargo/audit.toml is the single
        # source of truth) — see deny.toml. cargo-deny runs only the checks audit
        # does NOT do, so the two never diverge. Config: deny.toml.
        run: cargo deny check licenses bans sources

  migrations:
    name: validate migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ember_trove
          POSTGRES_PASSWORD: ember_trove_dev
          POSTGRES_DB: ember_trove
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ubuntu-cargo-sqlx-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-sqlx-

      - name: Install sqlx-cli
        # Pin to the 0.8 line to match the project's sqlx 0.8.6 dependency, so
        # the CLI's migration handling stays in lockstep with the library.
        run: cargo install sqlx-cli --version 0.8.6 --no-default-features --features postgres --locked

      - name: Run migrations
        env:
          DATABASE_URL: postgres://ember_trove:ember_trove_dev@localhost:5432/ember_trove
        run: sqlx migrate run --source migrations

  repo-tests:
    name: repo tests (postgres)
    runs-on: ubuntu-latest
    # Repo-layer tests against real SQL (api/src/repo/pg_tests.rs). Gated
    # behind the `pg-tests` feature so the plain `cargo test` job stays
    # database-free; #[sqlx::test] creates one migrated DB per test.

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ember_trove
          POSTGRES_PASSWORD: ember_trove_dev
          POSTGRES_DB: ember_trove
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-pgtests-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-pgtests-

      - name: Run repo tests against Postgres
        env:
          DATABASE_URL: postgres://ember_trove:ember_trove_dev@localhost:5432/ember_trove
        run: cargo test -p api --features pg-tests pg_tests

  docker-build:
    name: docker build validation
    runs-on: ubuntu-latest
    # Only run on ubuntu — Docker build is slow; skip on macos runner.
    # Builds both images to catch Dockerfile errors before a release deploy.

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build api image (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: deploy/Dockerfile.api
          push: false
          tags: ember-trove/api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ui image (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: deploy/Dockerfile.ui
          push: false
          tags: ember-trove/ui:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── E2E smoke (Playwright) ────────────────────────────────────────────────
  # Browser-level smoke tests against the dockerized stack with the
  # `e2e-bypass` api build (see e2e/README.md). Catches WASM runtime
  # regressions host-side tests cannot (added after v2.21.1, where both
  # hotfix bugs were invisible to cargo test/clippy).
  e2e:
    name: e2e smoke (playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Run e2e suite
        run: ./scripts/e2e.sh
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
