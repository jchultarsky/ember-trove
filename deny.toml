# cargo-deny configuration — supply-chain checks that complement `cargo audit`.
#
# Division of labour (see .claude/POLICY.md §1, §6):
#   * RUSTSEC advisories  → `cargo audit` (single source of truth for ignores is
#     `.cargo/audit.toml`). cargo-deny's `advisories` check is intentionally NOT
#     run in CI to avoid two diverging advisory gates.
#   * licenses / bans / sources → `cargo deny check licenses bans sources` (this
#     file). These are the checks cargo-audit does not perform, so there is no
#     overlap — the reason cargo-deny was previously deferred.
#
# CI runs: `cargo deny check licenses bans sources` (see .github/workflows/ci.yml).

[graph]
all-features = false

[licenses]
# Permissive licenses we accept (SPDX). Personal-data app: copyleft beyond
# MPL-2.0 (file-level) is deliberately excluded. Tune deliberately, never to
# "make CI pass" — a surprise GPL dep is a finding, not a config gap.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "CC0-1.0",
    # Permissive, all OSI/FSF-style; each enters the tree transitively:
    "BSL-1.0",             # Boost SW License — xxhash-rust (via leptos server_fn)
    "CDLA-Permissive-2.0", # Mozilla root-cert data — webpki-root-certs (via reqwest 0.13 rustls)
    "bzip2-1.0.6",         # bzip2 license — libbz2-rs-sys (via zip)
]
confidence-threshold = 0.8

# Our own workspace crates (api/common/ui) are MIT (repo LICENSE, `license = "MIT"`
# in each manifest) but marked `publish = false`; skipping them keeps the check
# focused on third-party deps.
private = { ignore = true }

[bans]
# Duplicate versions are tracked but not fatal — major bumps legitimately leave a
# transitive crate on an older line for a while (e.g. digest 0.10 alongside 0.11).
multiple-versions = "warn"
wildcards = "allow"

[sources]
# Supply-chain hardening: every dependency must come from a known registry, and
# no surprise git sources. Mirrors the SHA-pinned-Actions posture.
unknown-registry = "deny"
unknown-git = "deny"
